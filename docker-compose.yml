services:
  mongodb:
    image: mongo:7
    container_name: llm-refinery-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1
    container_name: llm-refinery-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: llm-refinery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: llm-refinery-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: llm-refinery-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - mlflow_db:/mlflow_db
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow_db/mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-refinery-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - minio
      - mlflow
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  minio_data:
  mlflow_db:
